<!DOCTYPE html>

<html class="dark" lang="zh-CN"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>KINETIC - HYROX 备赛登录</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:ital,wght@0,400;0,700;0,900;1,900&amp;family=Manrope:wght@400;600;800&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
      tailwind.config = {
        darkMode: "class",
        theme: {
          extend: {
            colors: {
              "primary": "#FFDE00",
              "on-primary": "#000000",
              "surface": "#0A0A0A",
              "surface-container": "#161616",
              "surface-container-high": "#242424",
              "on-surface": "#E5E2E1",
              "on-surface-variant": "#AFAFAF",
              "outline": "#333333",
            },
            fontFamily: {
              "headline": ["Inter", "sans-serif"],
              "body": ["Manrope", "sans-serif"],
            },
            borderRadius: {
              "DEFAULT": "0px",
              "lg": "2px",
            },
          },
        },
      }
    </script>
<style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
      .kinetic-texture {
        background-image: radial-gradient(circle at 2px 2px, rgba(255,222,0,0.03) 1px, transparent 0);
        background-size: 32px 32px;
      }
      .glow-effect {
        box-shadow: 0 0 40px -10px rgba(255, 222, 0, 0.15);
      }
    </style>
</head>
<body class="bg-surface text-on-surface font-body selection:bg-primary selection:text-on-primary overflow-hidden">
<main class="relative min-h-screen flex flex-col items-center justify-center px-6 kinetic-texture">
<!-- Kinetic Glow Background -->
<div class="absolute inset-0 z-0 overflow-hidden pointer-events-none">
<div class="absolute -top-[20%] -right-[10%] w-[600px] h-[600px] bg-primary opacity-[0.03] blur-[120px] rounded-full"></div>
<div class="absolute -bottom-[10%] -left-[5%] w-[400px] h-[400px] bg-primary opacity-[0.02] blur-[100px] rounded-full"></div>
</div>
<div class="w-full max-w-sm z-10">
<!-- Brand Header -->
<div class="mb-14 text-center">
<div class="inline-flex flex-col items-center justify-center">
<span class="material-symbols-outlined text-primary text-3xl mb-2" data-icon="bolt">bolt</span>
<h1 class="font-headline font-black italic text-6xl tracking-tighter text-primary leading-none uppercase">KINETIC</h1>
</div>
<p class="font-headline font-bold text-xs tracking-[0.3em] uppercase text-on-surface/60 mt-4 border-t border-outline pt-4 mx-auto w-fit">挑战你的极限</p>
</div>
<!-- Login Form -->
<div class="space-y-6">
<div class="space-y-4">
<!-- Contact Input -->
<div class="space-y-1.5">
<label class="block font-headline text-[10px] font-bold tracking-[0.2em] uppercase text-on-surface/40 ml-1">手机号 / 邮箱</label>
<div class="relative">
<input class="w-full bg-surface-container border border-outline rounded-none h-14 px-5 text-on-surface focus:border-primary focus:ring-0 transition-all placeholder:text-on-surface/20 text-sm" placeholder="输入您的联系方式" type="text"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface/20 text-xl" data-icon="person">person</span>
</div>
</div>
<!-- Password Input -->
<div class="space-y-1.5">
<label class="block font-headline text-[10px] font-bold tracking-[0.2em] uppercase text-on-surface/40 ml-1">登录密码</label>
<div class="relative">
<input class="w-full bg-surface-container border border-outline rounded-none h-14 px-5 text-on-surface focus:border-primary focus:ring-0 transition-all placeholder:text-on-surface/20 text-sm" placeholder="••••••••" type="password"/>
<span class="material-symbols-outlined absolute right-4 top-1/2 -translate-y-1/2 text-on-surface/20 text-xl" data-icon="lock">lock</span>
</div>
</div>
</div>
<!-- Login Action -->
<button class="w-full h-14 bg-primary hover:bg-primary/90 active:scale-[0.98] transition-all flex items-center justify-center group shadow-xl">
<span class="font-headline font-black text-on-primary text-base tracking-widest uppercase">立即登录</span>
<span class="material-symbols-outlined text-on-primary ml-2 group-hover:translate-x-1 transition-transform" data-icon="chevron_right">chevron_right</span>
</button>
<!-- Forgot Password -->
<div class="text-center">
<a class="font-headline text-[10px] font-bold text-on-surface/40 hover:text-primary transition-colors uppercase tracking-[0.2em]" href="#">忘记密码?</a>
</div>
<!-- Social Divider -->
<div class="flex items-center space-x-4 py-4">
<div class="h-[1px] flex-1 bg-outline"></div>
<span class="font-headline text-[9px] font-bold text-on-surface/30 tracking-[0.3em] uppercase">第三方登录</span>
<div class="h-[1px] flex-1 bg-outline"></div>
</div>
<!-- Social Buttons -->
<div class="grid grid-cols-2 gap-3">
<button class="bg-surface-container-high border border-outline h-14 flex items-center justify-center space-x-2 hover:bg-surface-container-high/80 transition-colors">
<span class="material-symbols-outlined text-on-surface/60 text-xl" data-icon="chat">chat</span>
<span class="font-headline text-[10px] font-bold tracking-[0.1em] uppercase">微信</span>
</button>
<button class="bg-surface-container-high border border-outline h-14 flex items-center justify-center space-x-2 hover:bg-surface-container-high/80 transition-colors">
<span class="material-symbols-outlined text-on-surface/60 text-xl" data-icon="apple">ios</span>
<span class="font-headline text-[10px] font-bold tracking-[0.1em] uppercase">APPLE ID</span>
</button>
</div>
</div>
<!-- Footer Registry -->
<div class="mt-16 text-center">
<p class="font-body text-xs text-on-surface/40 tracking-wider">
                还没有账号? 
                <a class="text-primary font-bold ml-2 uppercase border-b border-primary/30 pb-0.5 hover:border-primary transition-all" href="#">立即注册</a>
</p>
</div>
</div>
<!-- Editorial Details -->
<div class="absolute bottom-8 left-8 right-8 flex justify-between items-end opacity-20 pointer-events-none select-none">
<div class="font-headline font-black text-7xl leading-none italic text-outline">01</div>
<div class="text-right border-r-2 border-primary pr-4">
<div class="font-headline font-bold text-[9px] tracking-[0.4em] mb-1">ELITE PERFORMANCE</div>
<div class="font-headline font-bold text-[9px] tracking-[0.4em]">HYROX PREP v2.0</div>
</div>
</div>
</main>
</body></html>
